    <script>
        class XObject {
            #signalAssociations = new Map();

            signals() {
                return Array.from(this.#signalAssociations.keys());
            }

            createSignal(signal) {
                if (this.#signalAssociations.has(signal)) {
                    throw new Error(`Signal ${signal} already exists`);
                }
                this.#signalAssociations.set(signal, { connections: [] });
            }

            connectSignal(signal, target, slot) {
                if (!this.#signalAssociations.has(signal)) {
                    throw new Error(`Signal ${signal} does not exist`);
                }
                const associated = this.#signalAssociations.get(signal);
                associated.connections.push({ target: new WeakRef(target), slot });
            }

            emitSignal(signal, ...args) {
                const associated = this.#signalAssociations.get(signal);
                if (!associated) {
                    throw new Error(`Signal ${signal} does not exist`);
                }
                for (const [index, { target, slot }] of associated.connections.entries()) {
                    const derefTarget = target.deref();
                    if (derefTarget) {
                        derefTarget[slot](...args);
                    } else {
                        associated.connections.splice(index, 1);
                    }
                }
            }
        }

        class Input extends XObject {
            constructor() {
                super();
                this.createSignal('valueChanged');
            }

            set value(value) {
                this.emitSignal('valueChanged', value);
            }
        }
