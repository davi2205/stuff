<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function ElementFactory() {
            //
        }

        ElementFactory.prototype.createWindow = function(config) {
            var rootEl;
            rootEl = document.createElement('div');
            rootEl.innerHTML =
                '<div class="window">' +
                    '<div class="titlebar">' + config.title + '</div>' +
                    '<div class="content">' + config.content + '</div>' +
                '</div>';
            return rootEl;
        }
    </script>
</body>
</html>
